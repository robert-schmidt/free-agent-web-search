name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright browsers
      run: npx playwright install chromium --with-deps
    
    - name: Run tests
      run: npm test
    
    - name: Run demo tests
      run: npm run test:demo
      continue-on-error: true  # Demo may fail on some URLs

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check for console.log in production code
      run: |
        if grep -r "console\.log\|console\.error" core/ wrappers/ --include="*.js" | grep -v "//"; then
          echo "❌ Found console.log in production code"
          exit 1
        else
          echo "✅ No console.log in production code"
        fi
    
    - name: Check for TODO/FIXME
      run: |
        if grep -r "TODO\|FIXME\|XXX\|HACK" core/ wrappers/ --include="*.js"; then
          echo "⚠️  Found TODO/FIXME in code"
          exit 1
        else
          echo "✅ No TODO/FIXME found"
        fi

  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run npm audit
      run: npm audit --audit-level=moderate
    
    - name: Check for hardcoded secrets
      run: |
        if grep -r "password\|secret\|api_key\|token" core/ wrappers/ --include="*.js" | grep -i "="; then
          echo "⚠️  Potential hardcoded secrets found"
          exit 1
        else
          echo "✅ No hardcoded secrets detected"
        fi
